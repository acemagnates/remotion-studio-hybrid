name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Render GoldGraph
        run: npx remotion render GoldGraph out/video.mp4

      - name: Upload Finished MP4
        uses: actions/upload-artifact@v4
        with:
          name: GoldGraph-Video
          path: out/video.mp4
